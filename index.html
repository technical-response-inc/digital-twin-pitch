<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Factory Brain — Investor Pitch</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0B1D3A;
    --navy-mid: #0F2D5E;
    --navy-light: #1A3F7A;
    --amber: #D95F00;
    --amber-light: #FF8A3D;
    --blue-accent: #1A56A0;
    --blue-glow: #3B8BEB;
    --cream: #F4F0EB;
    --ice: #E8F1FB;
    --slate: #8A9AB5;
    --text-primary: #FFFFFF;
    --text-secondary: #9BB8DA;
    --text-body: #C8D6E5;
    --green: #34D399;
    --purple: #A78BFA;
    --cyan: #22D3EE;
  }

  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
  }

  #root { height: 100%; width: 100%; }

  .noise-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 256px 256px;
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04;
    background-image:
      linear-gradient(rgba(59,139,235,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,139,235,0.3) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .animate-in { animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
  .animate-fade { animation: fadeIn 0.8s ease forwards; opacity: 0; }
  .animate-scale { animation: scaleIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
  .animate-left { animation: slideInLeft 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.35s; }
  .delay-4 { animation-delay: 0.5s; }
  .delay-5 { animation-delay: 0.65s; }
  .delay-6 { animation-delay: 0.8s; }
  .delay-7 { animation-delay: 0.95s; }
  .delay-8 { animation-delay: 1.1s; }
  .delay-9 { animation-delay: 1.25s; }

  .slide-container {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 60px;
    overflow-y: auto;
  }
  .slide-inner {
    max-width: 1100px; width: 100%;
    position: relative; z-index: 1;
  }

  .font-display { font-family: 'DM Serif Display', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  .section-label {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--amber); margin-bottom: 20px;
  }
  .section-label::before {
    content: ''; display: block; width: 4px; height: 20px;
    background: var(--amber); border-radius: 2px;
  }

  .stat-card {
    background: linear-gradient(135deg, rgba(26,63,122,0.4), rgba(15,45,94,0.6));
    border: 1px solid rgba(59,139,235,0.15);
    border-radius: 16px; padding: 32px 24px;
    text-align: center; position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease, border-color 0.3s ease;
  }
  .stat-card:hover {
    transform: translateY(-4px);
    border-color: rgba(59,139,235,0.35);
  }
  .stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .stat-card:hover::after { opacity: 1; }
  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 3.2rem; line-height: 1; color: var(--blue-glow);
    margin-bottom: 8px;
  }
  .stat-label {
    font-weight: 600; font-size: 0.85rem; color: var(--text-primary);
    letter-spacing: 0.02em; margin-bottom: 4px;
  }
  .stat-sub { font-size: 0.75rem; color: var(--slate); font-style: italic; }

  .problem-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 14px 20px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(217,95,0,0.06), transparent);
    border-left: 3px solid var(--amber);
    transition: background 0.3s ease, transform 0.2s ease;
  }
  .problem-item:hover {
    background: linear-gradient(135deg, rgba(217,95,0,0.12), transparent);
    transform: translateX(4px);
  }
  .problem-arrow {
    color: var(--amber); font-weight: 700; font-size: 1.1rem;
    flex-shrink: 0; margin-top: 1px;
  }

  /* ---- Lifecycle quadrant cards ---- */
  .quad-card {
    position: relative; padding: 24px; border-radius: 16px;
    background: linear-gradient(145deg, rgba(26,63,122,0.3), rgba(11,29,58,0.8));
    border: 1px solid rgba(59,139,235,0.12);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden; cursor: pointer;
  }
  .quad-card:hover {
    border-color: rgba(59,139,235,0.3);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .quad-card.active {
    border-color: var(--amber);
    box-shadow: 0 0 30px rgba(217,95,0,0.12);
  }
  .quad-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
  }
  .quad-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .quad-title {
    font-family: 'DM Serif Display', serif; font-size: 1.15rem;
  }
  .quad-subtitle {
    font-size: 0.78rem; color: var(--slate); font-style: italic; margin-bottom: 12px; padding-left: 52px;
  }
  .quad-bullets {
    padding-left: 52px;
  }
  .quad-bullets li {
    font-size: 0.82rem; color: var(--text-body); line-height: 1.7;
    list-style: none; position: relative; padding-left: 14px;
  }
  .quad-bullets li::before {
    content: '\2022'; position: absolute; left: 0; color: var(--amber);
  }

  /* ---- Connector arrows ---- */
  .lifecycle-flow {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin-bottom: 28px;
  }
  .flow-step {
    padding: 8px 20px; border-radius: 8px; font-weight: 600; font-size: 0.82rem;
    letter-spacing: 0.03em; cursor: pointer; transition: all 0.3s ease;
    border: 1px solid transparent;
  }
  .flow-step:hover { transform: translateY(-2px); }
  .flow-arrow { color: var(--slate); font-size: 0.9rem; }

  /* ---- Stack items ---- */
  .stack-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-radius: 10px;
    background: linear-gradient(135deg, rgba(26,63,122,0.25), rgba(11,29,58,0.5));
    border: 1px solid rgba(59,139,235,0.08);
    transition: all 0.3s ease;
  }
  .stack-item:hover {
    border-color: rgba(59,139,235,0.2);
    transform: translateX(4px);
  }
  .stack-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* ---- Feature cards ---- */
  .feature-card {
    position: relative; padding: 28px; border-radius: 16px;
    background: linear-gradient(145deg, rgba(26,63,122,0.3), rgba(11,29,58,0.8));
    border: 1px solid rgba(59,139,235,0.12);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
  }
  .feature-card:hover {
    border-color: rgba(59,139,235,0.3);
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .feature-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; margin-bottom: 16px;
    background: linear-gradient(135deg, var(--amber), var(--amber-light));
    color: white;
  }
  .feature-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem; margin-bottom: 10px; color: var(--text-primary);
  }
  .feature-desc {
    font-size: 0.88rem; line-height: 1.65; color: var(--text-body);
  }

  /* ---- Business model layers ---- */
  .biz-layer {
    position: relative; border-radius: 16px; overflow: hidden;
    background: linear-gradient(135deg, rgba(26,63,122,0.25), rgba(11,29,58,0.6));
    border: 1px solid rgba(59,139,235,0.1);
    cursor: pointer; transition: all 0.4s ease;
  }
  .biz-layer:hover { border-color: rgba(59,139,235,0.25); }
  .biz-layer.active { border-color: var(--amber); }
  .biz-layer.active .biz-layer-header { background: rgba(217,95,0,0.08); }
  .biz-layer-header {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px; transition: background 0.3s ease;
  }
  .biz-layer-number {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 0.85rem;
    background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
    border: 1px solid rgba(59,139,235,0.2);
    transition: all 0.3s ease;
  }
  .biz-layer.active .biz-layer-number {
    background: linear-gradient(135deg, var(--amber), var(--amber-light));
    border-color: transparent;
  }
  .biz-layer-title {
    font-family: 'DM Serif Display', serif; font-size: 1.1rem; flex: 1;
  }
  .biz-layer-subtitle { font-size: 0.8rem; color: var(--slate); }
  .biz-layer-chevron {
    font-size: 1rem; color: var(--slate); transition: transform 0.3s ease;
  }
  .biz-layer.active .biz-layer-chevron { transform: rotate(180deg); color: var(--amber); }
  .biz-layer-content {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .biz-layer.active .biz-layer-content { max-height: 600px; }
  .biz-layer-body { padding: 0 24px 24px 76px; }
  .biz-layer-body p {
    font-size: 0.88rem; line-height: 1.7; color: var(--text-body); margin-bottom: 12px;
  }
  .biz-layer-body .bullet {
    display: flex; gap: 10px; margin-bottom: 8px;
    font-size: 0.85rem; line-height: 1.6; color: var(--text-body);
  }
  .biz-layer-body .bullet-icon { color: var(--amber); flex-shrink: 0; margin-top: 2px; }

  .why-item {
    display: flex; gap: 20px; padding: 18px 0;
    border-bottom: 1px solid rgba(59,139,235,0.08);
  }
  .why-item:last-child { border-bottom: none; }
  .why-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--amber); flex-shrink: 0; margin-top: 6px;
    box-shadow: 0 0 16px rgba(217,95,0,0.4);
  }
  .why-title { font-weight: 600; color: var(--text-primary); margin-bottom: 6px; font-size: 0.95rem; }
  .why-desc { font-size: 0.88rem; line-height: 1.65; color: var(--text-body); }

  .gtm-step {
    display: flex; gap: 20px; align-items: flex-start;
    padding: 20px 24px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(26,63,122,0.2), transparent);
    border: 1px solid rgba(59,139,235,0.08);
    transition: all 0.3s ease;
  }
  .gtm-step:hover {
    border-color: rgba(59,139,235,0.2);
    background: linear-gradient(135deg, rgba(26,63,122,0.35), transparent);
  }
  .gtm-number {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem; color: var(--navy-light);
    line-height: 1; flex-shrink: 0; width: 40px;
  }

  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 100;
    background: linear-gradient(90deg, var(--amber), var(--amber-light));
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 12px rgba(217,95,0,0.5);
  }

  .nav-dots {
    position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px; z-index: 100;
  }
  .nav-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(155,184,218,0.2); border: none; cursor: pointer;
    transition: all 0.3s ease; position: relative;
  }
  .nav-dot.active {
    background: var(--amber);
    box-shadow: 0 0 12px rgba(217,95,0,0.5);
    transform: scale(1.3);
  }
  .nav-dot:hover:not(.active) {
    background: rgba(155,184,218,0.5); transform: scale(1.15);
  }
  .nav-dot-label {
    position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
    white-space: nowrap; font-size: 0.7rem; color: var(--slate);
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
  }
  .nav-dot:hover .nav-dot-label { opacity: 1; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 40px;
    background: linear-gradient(to top, rgba(11,29,58,0.95), transparent);
  }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 0.85rem;
    border: 1px solid rgba(59,139,235,0.2); background: rgba(26,63,122,0.3);
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.3s ease; backdrop-filter: blur(10px);
  }
  .nav-btn:hover {
    border-color: rgba(59,139,235,0.4);
    background: rgba(26,63,122,0.5);
    color: var(--text-primary);
  }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--amber), var(--amber-light));
    border-color: transparent; color: white;
  }
  .nav-btn.primary:hover {
    box-shadow: 0 4px 20px rgba(217,95,0,0.4);
    transform: translateY(-1px);
  }
  .nav-btn:disabled {
    opacity: 0.3; cursor: not-allowed; transform: none !important;
    box-shadow: none !important;
  }
  .slide-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--slate); letter-spacing: 0.1em;
  }

  .callout {
    padding: 20px 24px; border-radius: 14px; margin-top: 24px;
    background: linear-gradient(135deg, rgba(217,95,0,0.08), rgba(217,95,0,0.03));
    border: 1px solid rgba(217,95,0,0.2);
  }
  .callout-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--amber); text-transform: uppercase; margin-bottom: 8px;
  }
  .callout p { font-size: 0.9rem; line-height: 1.7; color: var(--text-body); }

  .endgame-quote {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem; line-height: 1.4;
    color: var(--text-primary); position: relative; padding-left: 28px;
  }
  .endgame-quote::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 2px;
    background: linear-gradient(to bottom, var(--amber), var(--amber-light));
  }

  .revenue-highlight {
    display: inline-block; padding: 3px 12px; border-radius: 6px;
    background: rgba(217,95,0,0.15); color: var(--amber-light);
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(155,184,218,0.2); border-radius: 4px; }

  @media (max-width: 768px) {
    .slide-container { padding: 30px 24px 80px; }
    .stat-number { font-size: 2.2rem; }
    .nav-dots { display: none; }
    .bottom-nav { padding: 12px 20px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SLIDES = [
  { id: 'hero', label: 'Cover' },
  { id: 'opportunity', label: 'Opportunity' },
  { id: 'problem', label: 'Problem' },
  { id: 'lifecycle', label: 'Lifecycle' },
  { id: 'factory-memory', label: 'Factory Memory' },
  { id: 'deploy', label: 'What We Deploy' },
  { id: 'why-now', label: 'Why Now' },
  { id: 'business-model', label: 'Business Model' },
  { id: 'gtm', label: 'Go-To-Market' },
  { id: 'endgame', label: 'Endgame' },
];

// ─── Animated Counter ───
function AnimatedNumber({ value, prefix = '', suffix = '', delay = 0 }) {
  const [display, setDisplay] = useState(0);
  const [started, setStarted] = useState(false);
  useEffect(() => { const t = setTimeout(() => setStarted(true), delay); return () => clearTimeout(t); }, [delay]);
  useEffect(() => {
    if (!started) return;
    const num = parseFloat(value.replace(/[^0-9.]/g, ''));
    if (isNaN(num)) { setDisplay(value); return; }
    let step = 0; const steps = 40;
    const interval = setInterval(() => {
      step++;
      const eased = 1 - Math.pow(1 - step / steps, 3);
      setDisplay(Math.round(num * eased));
      if (step >= steps) { setDisplay(num); clearInterval(interval); }
    }, 30);
    return () => clearInterval(interval);
  }, [started, value]);
  return <span>{prefix}{started ? display : 0}{suffix}</span>;
}

// ═══════════════════ SLIDE 1: HERO ═══════════════════
function HeroSlide() {
  return (
    <div className="slide-container" style={{ background: 'radial-gradient(ellipse at 30% 40%, rgba(26,63,122,0.4), transparent 70%)' }}>
      <div className="slide-inner" style={{ textAlign: 'center', maxWidth: 900 }}>
        <div className="animate-fade delay-1" style={{ marginBottom: 32 }}>
          <div className="font-mono" style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '6px 16px', borderRadius: 8,
            background: 'rgba(217,95,0,0.1)', border: '1px solid rgba(217,95,0,0.2)',
            fontSize: '0.7rem', letterSpacing: '0.15em', color: 'var(--amber)',
            textTransform: 'uppercase'
          }}>
            Investor Overview
          </div>
        </div>

        <h1 className="font-display animate-in delay-2" style={{
          fontSize: 'clamp(2.4rem, 5.5vw, 4.2rem)', lineHeight: 1.15,
          marginBottom: 24, fontWeight: 400
        }}>
          The Factory Brain<br />
          <span style={{ color: 'var(--text-secondary)' }}>SMB Manufacturers</span><br />
          <span style={{ color: 'var(--text-secondary)' }}>Have Been Waiting For.</span>
        </h1>

        <p className="animate-in delay-3" style={{
          fontSize: '1.1rem', color: 'var(--slate)', maxWidth: 640,
          margin: '0 auto 36px', lineHeight: 1.7, fontStyle: 'italic'
        }}>
          Design. Build. Simulate. Operate. &mdash; A full-lifecycle AI platform for the other 98% of manufacturers.
        </p>

        <div className="animate-in delay-5" style={{
          display: 'flex', justifyContent: 'center', gap: 8, flexWrap: 'wrap'
        }}>
          {['Design', 'Build', 'Simulate', 'Operate'].map((step, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span style={{ color: 'var(--slate)', fontSize: '0.85rem', alignSelf: 'center' }}>&rarr;</span>}
              <div style={{
                padding: '8px 20px', borderRadius: 8,
                background: i === 0 ? 'rgba(52,211,153,0.12)' : i === 1 ? 'rgba(59,139,235,0.12)' : i === 2 ? 'rgba(167,139,250,0.12)' : 'rgba(217,95,0,0.12)',
                border: `1px solid ${i === 0 ? 'rgba(52,211,153,0.3)' : i === 1 ? 'rgba(59,139,235,0.3)' : i === 2 ? 'rgba(167,139,250,0.3)' : 'rgba(217,95,0,0.3)'}`,
                color: i === 0 ? 'var(--green)' : i === 1 ? 'var(--blue-glow)' : i === 2 ? 'var(--purple)' : 'var(--amber-light)',
                fontWeight: 600, fontSize: '0.85rem', letterSpacing: '0.03em'
              }}>
                {step}
              </div>
            </React.Fragment>
          ))}

      <div className="slide-inner" style={{ maxWidth: 800 }}>
        <div className="section-label animate-in">The Endgame</div>
        <div className="endgame-quote animate-in delay-2" style={{ marginBottom: 28 }}>
          The factory floor is the last major economic surface that has never been truly connected.
        </div>
        <p className="animate-in delay-3" style={{ fontSize: '1rem', lineHeight: 1.8, color: 'var(--text-body)', marginBottom: 20 }}>
          Enterprise manufacturers have had this layer for decades &mdash; it is why they outcompete on quality,
          cost, and speed. We are bringing that same capability to the <strong style={{ color: 'var(--text-primary)' }}>other 98% of manufacturers</strong> who build the physical world.
        </p>
        <p className="animate-in delay-4" style={{ fontSize: '0.92rem', lineHeight: 1.8, color: 'var(--text-body)', marginBottom: 32 }}>
          In five years, every SMB factory in our network shares a common intelligence layer. A manufacturer
          can design a new line, simulate it against real production data from 500 peer factories, deploy it
          with a pre-certified camera kit, and have AI agents optimizing output within <strong style={{ color: 'var(--amber-light)' }}>weeks &mdash; not years</strong>.
          Machines talk to each other across facilities. A failure pattern spotted in Michigan
          updates the maintenance model everywhere. Robots get smarter every time a new factory connects.
        </p>
        <div className="animate-in delay-5" style={{
          textAlign: 'center', padding: '36px 0 16px',
          borderTop: '1px solid rgba(59,139,235,0.1)'
        }}>
          <div className="font-display" style={{ fontSize: '1.5rem', marginBottom: 8, color: 'var(--text-primary)' }}>
            We are not building a digital twin tool.
          </div>
          <div className="font-display" style={{
            fontSize: '2rem', color: 'var(--amber-light)',
            textShadow: '0 0 40px rgba(217,95,0,0.3)'
          }}>
            We are building the operating system<br />that manufacturing runs on.
          </div>
        </div>
        <div className="animate-fade delay-7" style={{
          textAlign: 'center', marginTop: 44,
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: '0.85rem', color: 'var(--amber)', letterSpacing: '0.1em'
        }}>
          Let's talk.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ MAIN APP ═══════════════════
function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [slideKey, setSlideKey] = useState(0);
  const transitioning = useRef(false);
  const total = SLIDES.length;

  const goTo = useCallback((idx) => {
    if (idx < 0 || idx >= total || transitioning.current) return;
    transitioning.current = true;
    setSlideKey(k => k + 1);
    setCurrentSlide(idx);
    setTimeout(() => { transitioning.current = false; }, 400);
  }, [total]);

  const next = useCallback(() => goTo(currentSlide + 1), [currentSlide, goTo]);
  const prev = useCallback(() => goTo(currentSlide - 1), [currentSlide, goTo]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault(); next();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); prev();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [next, prev]);

  const slideComponents = [
    HeroSlide, OpportunitySlide, ProblemSlide, LifecycleSlide,
    FactoryMemorySlide, DeploySlide, WhyNowSlide,
    BusinessModelSlide, GTMSlide, EndgameSlide
  ];

  const SlideComponent = slideComponents[currentSlide];
  const progress = ((currentSlide + 1) / total) * 100;

  return (
    <>
      <div className="noise-overlay" />
      <div className="grid-bg" />
      <div className="progress-bar" style={{ width: `${progress}%` }} />

      <div className="nav-dots">
        {SLIDES.map((s, i) => (
          <button key={i} className={`nav-dot ${i === currentSlide ? 'active' : ''}`} onClick={() => goTo(i)}>
            <span className="nav-dot-label">{s.label}</span>
          </button>
        ))}
      </div>

      <div key={slideKey} style={{ height: '100%', width: '100%' }}>
        <SlideComponent />
      </div>

      <div className="bottom-nav">
        <button className="nav-btn" onClick={prev} disabled={currentSlide === 0}>&larr; Back</button>
        <div className="slide-counter">
          {String(currentSlide + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
          <span style={{ margin: '0 12px', opacity: 0.3 }}>|</span>
          {SLIDES[currentSlide].label}
        </div>
        <button
          className={`nav-btn ${currentSlide < total - 1 ? 'primary' : ''}`}
          onClick={next}
          disabled={currentSlide === total - 1}
        >
          {currentSlide < total - 1 ? 'Next' : 'End'} &rarr;
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
